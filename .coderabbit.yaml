# CodeRabbit 配置
# 文档：https://docs.coderabbit.ai/guides/configure-coderabbit

# review 评论使用的语言
language: zh-CN

reviews:
  # chill = 温和；assertive = 更严格、更主动指出问题
  profile: chill
  # 关掉「请求修改」工作流，避免阻塞 PR 合并
  request_changes_workflow: false
  # 在 PR 顶部追加变更高层摘要
  high_level_summary: true
  # AI 写诗彩蛋，每次 review summary 末尾附一段 limerick
  poem: true
  # 在 PR 描述里展示 review 状态
  review_status: true
  auto_review:
    # PR 打开/重开时自动 review
    enabled: true
    # draft PR 不消耗 review 额度
    drafts: false
    # 后续 push 增量 review，不重新跑全量
    auto_incremental_review: true
  # 这些路径不进入 review 范围
  path_filters:
    - "!uv.lock"
    - "!**/__pycache__/**"
    - "!.venv/**"
    - "!downloads/**"

chat:
  # 在 PR 评论里 @coderabbitai 提问时自动回复
  auto_reply: true
